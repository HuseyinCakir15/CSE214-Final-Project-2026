<div class="login-container">
  <div class="login-box">
    <h2>Giriş Yap</h2>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input
      type="password"
      placeholder="Şifre"
      [(ngModel)]="password"
    />

    <button (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Giriş yapılıyor...' : 'Giriş Yap' }}
    </button>

    <p>Hesabın yok mu? <a routerLink="/register">Kayıt Ol</a></p>
  </div>
</div>
