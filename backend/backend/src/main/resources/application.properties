spring.application.name=backend

# ─────────────────────────────────────────────
# MySQL Bağlantısı
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db
spring.datasource.username=root
spring.datasource.password=mypassword123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────
# JPA Ayarları
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─────────────────────────────────────────────
# JWT
# Production'da JWT_SECRET environment variable set et:
#   export JWT_SECRET=gizli-deger
# Yoksa aşağıdaki varsayılan değer kullanılır.
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ecommerce-super-secret-key-change-this-in-production-min-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─────────────────────────────────────────────
# CORS
# ─────────────────────────────────────────────
cors.allowed-origin=${CORS_ORIGIN:http://localhost:4200}

# ─────────────────────────────────────────────
# Port
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# Chatbot Python servisi
# ─────────────────────────────────────────────
chatbot.url=http://localhost:8000